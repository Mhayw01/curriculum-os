<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Curriculum OS — refined logo (C + OS book)</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
<style>
  :root{--purple:#5740F1;--cyan:#3FD0E0;--orange:#FA602F;--ink:#0E1116;--muted:#5A6072;--line:#E7E7EE}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Manrope",sans-serif;color:var(--ink);background:#fafafe;padding:40px 20px;line-height:1.5}
  .wrap{max-width:900px;margin:0 auto}
  h1{font-family:"Space Grotesk";font-size:26px;letter-spacing:-.02em}
  .sub{color:var(--muted);margin:6px 0 30px;max-width:640px}
  .panel{border-radius:16px;padding:34px;display:flex;align-items:center;gap:40px;flex-wrap:wrap;margin-bottom:18px}
  .panel.light{background:#fff;border:1px solid var(--line)}
  .panel.dark{background:var(--ink)}
  .panel.dark .wm{color:#fff}.panel.dark .os{color:#9b8cff}
  .lockup{display:flex;align-items:center;gap:14px}
  .wm{font-family:"Space Grotesk";font-weight:700;font-size:30px;letter-spacing:-.02em}
  .os{color:var(--purple)}
  .sizes{display:flex;align-items:center;gap:26px}
  .label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);width:100%;margin-bottom:4px}
  .panel.dark .label{color:#7c8295}
</style>
</head>
<body>
<div class="wrap">
  <h1>Refined logo — C ring + "OS" book</h1>
  <p class="sub">Your original mark, with <strong>O</strong> on the left page and <strong>S</strong> on the right: the ring gives the C, the book gives the OS. Shown with the lockup and at 96 / 48 / 32px (favicon size) to check it holds up small.</p>

  <div class="panel light">
    <span class="label">Light</span>
    <div class="lockup">
      <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="lg" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#5740F1"/><stop offset="1" stop-color="#3FD0E0"/></linearGradient></defs>
        <path d="M44 12.5A26 26 0 1 0 54 33" fill="none" stroke="url(#lg)" stroke-width="6" stroke-linecap="round"/>
        <path d="M32 24c-3.8-2.6-8.4-3.1-13.6-1.9a1.5 1.5 0 0 0-1.4 1.5V41a1.2 1.2 0 0 0 1.5 1.15C23 41 27.8 41.4 32 44Z" fill="url(#lg)"/>
        <path d="M32 24c3.8-2.6 8.4-3.1 13.6-1.9a1.5 1.5 0 0 1 1.4 1.5V41a1.2 1.2 0 0 1-1.5 1.15C41 41 36.2 41.4 32 44Z" fill="url(#lg)"/>
        <line x1="32" y1="24.5" x2="32" y2="44" stroke="#063a44" stroke-width="1.3" opacity=".32"/>
        <text x="24.6" y="37" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-weight="700" font-size="11" fill="#fff">O</text>
        <text x="39.4" y="37" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-weight="700" font-size="11" fill="#fff">S</text>
        <circle cx="50" cy="14" r="5" fill="#FA602F"/>
      </svg>
      <span class="wm">Curriculum<span class="os"> OS</span></span>
    </div>
    <div class="sizes">
      <svg width="48" height="48" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="lg48" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#5740F1"/><stop offset="1" stop-color="#3FD0E0"/></linearGradient></defs><path d="M44 12.5A26 26 0 1 0 54 33" fill="none" stroke="url(#lg48)" stroke-width="6" stroke-linecap="round"/><path d="M32 24c-3.8-2.6-8.4-3.1-13.6-1.9a1.5 1.5 0 0 0-1.4 1.5V41a1.2 1.2 0 0 0 1.5 1.15C23 41 27.8 41.4 32 44Z" fill="url(#lg48)"/><path d="M32 24c3.8-2.6 8.4-3.1 13.6-1.9a1.5 1.5 0 0 1 1.4 1.5V41a1.2 1.2 0 0 1-1.5 1.15C41 41 36.2 41.4 32 44Z" fill="url(#lg48)"/><line x1="32" y1="24.5" x2="32" y2="44" stroke="#063a44" stroke-width="1.3" opacity=".32"/><text x="24.6" y="37" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-weight="700" font-size="11" fill="#fff">O</text><text x="39.4" y="37" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-weight="700" font-size="11" fill="#fff">S</text><circle cx="50" cy="14" r="5" fill="#FA602F"/></svg>
      <svg width="32" height="32" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="lg32" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#5740F1"/><stop offset="1" stop-color="#3FD0E0"/></linearGradient></defs><path d="M44 12.5A26 26 0 1 0 54 33" fill="none" stroke="url(#lg32)" stroke-width="6" stroke-linecap="round"/><path d="M32 24c-3.8-2.6-8.4-3.1-13.6-1.9a1.5 1.5 0 0 0-1.4 1.5V41a1.2 1.2 0 0 0 1.5 1.15C23 41 27.8 41.4 32 44Z" fill="url(#lg32)"/><path d="M32 24c3.8-2.6 8.4-3.1 13.6-1.9a1.5 1.5 0 0 1 1.4 1.5V41a1.2 1.2 0 0 1-1.5 1.15C41 41 36.2 41.4 32 44Z" fill="url(#lg32)"/><line x1="32" y1="24.5" x2="32" y2="44" stroke="#063a44" stroke-width="1.3" opacity=".32"/><text x="24.6" y="37" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-weight="700" font-size="11" fill="#fff">O</text><text x="39.4" y="37" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-weight="700" font-size="11" fill="#fff">S</text><circle cx="50" cy="14" r="5" fill="#FA602F"/></svg>
    </div>
  </div>

  <div class="panel dark">
    <span class="label">Dark</span>
    <div class="lockup">
      <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="dg" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#7b67ff"/><stop offset="1" stop-color="#3FD0E0"/></linearGradient></defs>
        <path d="M44 12.5A26 26 0 1 0 54 33" fill="none" stroke="url(#dg)" stroke-width="6" stroke-linecap="round"/>
        <path d="M32 24c-3.8-2.6-8.4-3.1-13.6-1.9a1.5 1.5 0 0 0-1.4 1.5V41a1.2 1.2 0 0 0 1.5 1.15C23 41 27.8 41.4 32 44Z" fill="url(#dg)"/>
        <path d="M32 24c3.8-2.6 8.4-3.1 13.6-1.9a1.5 1.5 0 0 1 1.4 1.5V41a1.2 1.2 0 0 1-1.5 1.15C41 41 36.2 41.4 32 44Z" fill="url(#dg)"/>
        <line x1="32" y1="24.5" x2="32" y2="44" stroke="#06262c" stroke-width="1.3" opacity=".4"/>
        <text x="24.6" y="37" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-weight="700" font-size="11" fill="#fff">O</text>
        <text x="39.4" y="37" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-weight="700" font-size="11" fill="#fff">S</text>
        <circle cx="50" cy="14" r="5" fill="#FA602F"/>
      </svg>
      <span class="wm">Curriculum<span class="os"> OS</span></span>
    </div>
  </div>
</div>
</body>
</html>
